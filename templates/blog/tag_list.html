{% extends 'base.html' %}

{% block title %}Теги · RelizBlog{% endblock %}

{% block content %}
<section class="page-heading">
    <h1>Теги</h1>
    <a class="button-link" href="{% url 'blog:tag_create' %}">Створити тег</a>
</section>

<section class="cards-grid">
    {% for tag in tags %}
        <article class="card">
            <h2><a href="{{ tag.get_absolute_url }}">{{ tag.name }}</a></h2>
            <div class="actions">
                <a href="{% url 'blog:tag_update' tag.slug %}">Редагувати</a>
                <a class="danger-link" href="{% url 'blog:tag_delete' tag.slug %}">Видалити</a>
            </div>
        </article>
    {% empty %}
        <p class="empty">Тегів ще немає.</p>
    {% endfor %}
</section>
{% endblock %}
