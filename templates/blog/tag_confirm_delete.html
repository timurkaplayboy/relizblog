{% extends 'base.html' %}

{% block title %}Видалення тегу · RelizBlog{% endblock %}

{% block content %}
<section class="form-panel">
    <h1>Видалити тег?</h1>
    <p>Тег “{{ object.name }}” буде прибраний зі статей.</p>
    <form method="post">
        {% csrf_token %}
        <button class="danger-button" type="submit">Видалити</button>
        <a href="{% url 'blog:tag_list' %}">Скасувати</a>
    </form>
</section>
{% endblock %}
