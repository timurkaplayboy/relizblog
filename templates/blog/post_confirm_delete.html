{% extends 'base.html' %}

{% block title %}Видалення статті · RelizBlog{% endblock %}

{% block content %}
<section class="form-panel">
    <h1>Видалити статтю?</h1>
    <p>Стаття “{{ object.title }}” буде видалена разом із коментарями та медіа.</p>
    <form method="post">
        {% csrf_token %}
        <button class="danger-button" type="submit">Видалити</button>
        <a href="{{ object.get_absolute_url }}">Скасувати</a>
    </form>
</section>
{% endblock %}
