{% extends 'base.html' %}

{% block title %}Категорія · RelizBlog{% endblock %}

{% block content %}
<section class="form-panel">
    <h1>{% if object %}Редагування категорії{% else %}Нова категорія{% endif %}</h1>

        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Зберегти</button>
    </form>
</section>
{% endblock %}
