{% extends 'base.html' %}

{% block title %}Редагування профілю · RelizBlog{% endblock %}

{% block content %}
<section class="form-panel">
    <h1>Редагування профілю</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ user_form.as_p }}
        {{ profile_form.as_p }}
        <button type="submit">Зберегти</button>
    </form>
</section>
{% endblock %}
